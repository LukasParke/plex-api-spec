  /{transcodeType}/:/transcode/universal/decision:
    get:
      operationId: makeDecision
      summary: Make a decision on media playback
      tags:
        - Transcoder
      description: Make a decision on media playback based on client profile, and requested settings such as bandwidth and resolution.
      parameters:
        - $ref: "#/components/parameters/accepts"
        - $ref: "#/components/parameters/X-Plex-Client-Identifier"
        - $ref: "#/components/parameters/X-Plex-Product"
        - $ref: "#/components/parameters/X-Plex-Version"
        - $ref: "#/components/parameters/X-Plex-Platform"
        - $ref: "#/components/parameters/X-Plex-Platform-Version"
        - $ref: "#/components/parameters/X-Plex-Device"
        - $ref: "#/components/parameters/X-Plex-Model"
        - $ref: "#/components/parameters/X-Plex-Device-Vendor"
        - $ref: "#/components/parameters/X-Plex-Device-Name"
        - $ref: "#/components/parameters/X-Plex-Marketplace"
        - $ref: "#/components/parameters/transcodeType"
        - $ref: "#/components/parameters/transcodeSessionId"
        - $ref: "#/components/parameters/advancedSubtitles"
        - name: platform
          description: Client platform (some clients send this in addition to headers).
          in: query
          schema:
            type: string
        - name: audioBoost
          description: Percentage of original audio loudness to use when transcoding (100 is equivalent to original volume, 50 is half, 200 is double, etc)
          in: query
          schema:
            type: integer
            minimum: 1
          example: 50
        - name: audioChannelCount
          description: Target video number of audio channels.
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 8
          example: 5
        - name: autoAdjustQuality
          description: Indicates the client supports ABR.
          in: query
          schema:
            $ref: "#/components/schemas/BoolInt"
          example: 1
        - name: autoAdjustSubtitle
          description: Indicates if the server should adjust subtitles based on Voice Activity Data.
          in: query
          schema:
            $ref: "#/components/schemas/BoolInt"
          example: 1
        - name: directPlay
          description: Indicates the client supports direct playing the indicated content.
          in: query
          schema:
            $ref: "#/components/schemas/BoolInt"
          example: 1
        - name: directStream
          description: Indicates the client supports direct streaming the video of the indicated content.
          in: query
          schema:
            $ref: "#/components/schemas/BoolInt"
          example: 1
        - name: directStreamAudio
          description: Indicates the client supports direct streaming the audio of the indicated content.
          in: query
          schema:
            $ref: "#/components/schemas/BoolInt"
          example: 1
        - name: disableResolutionRotation
          description: Indicates if resolution should be adjusted for orientation.
          in: query
          schema:
            $ref: "#/components/schemas/BoolInt"
          example: 1
        - name: hasMDE
          description: Ignore client profiles when determining if direct play is possible. Only has an effect when directPlay=1 and both mediaIndex and partIndex are specified and neither are -1
          in: query
          schema:
            $ref: "#/components/schemas/BoolInt"
          example: 1
        - name: location
          description: Network type of the client, can be used to help determine target bitrate.
          in: query
          schema:
            type: string
            enum:
              - lan
              - wan
              - cellular
          example: wan
        - name: mediaBufferSize
          description: Buffer size used in playback (in KB). Clients should specify a lower bound if not known exactly. This value could make the difference between transcoding and direct play on bandwidth constrained networks.
          in: query
          schema:
            type: integer
          example: 102400
        - name: mediaIndex
          description: Index of the media to transcode. -1 or not specified indicates let the server choose.
          in: query
          schema:
            type: integer
          example: 0
        - name: musicBitrate
          description: Target bitrate for audio only files (in kbps, used to transcode).
          in: query
          schema:
            type: integer
            minimum: 0
          example: 5000
        - name: offset
          description: Offset from the start of the media (in seconds).
          in: query
          schema:
            type: number
          example: 90.5
        - name: partIndex
          description: Index of the part to transcode. -1 or not specified indicates the server should join parts together in a transcode
          in: query
          schema:
            type: integer
          example: 0
        - name: path
          description: Internal PMS path of the media to transcode.
          in: query
          schema:
            type: string
          example: /library/metadata/151671
        - name: peakBitrate
          description: Maximum bitrate (in kbps) to use in ABR.
          in: query
          schema:
            type: integer
            minimum: 0
          example: 12000
        - name: photoResolution
          description: Target photo resolution.
          in: query
          schema:
            type: string
            pattern: ^\d[x:]\d$
          example: 1080x1080
        - name: protocol
          description: "Indicates the network streaming protocol to be used for the transcode session: * 'http' - include the file in the http response such as MKV streaming * 'hls' - hls stream (RFC 8216) * 'dash' - dash stream (ISO/IEC 23009-1:2022)"
          in: query
          schema:
            type: string
            enum:
              - http
              - hls
              - dash
          example: dash
        - name: secondsPerSegment
          description: Number of seconds to include in each transcoded segment
          in: query
          schema:
            type: integer
          example: 5
        - name: subtitleSize
          description: Percentage of original subtitle size to use when burning subtitles (100 is equivalent to original size, 50 is half, ect)
          in: query
          schema:
            type: integer
            minimum: 1
          example: 50
        - name: subtitles
          description: "Indicates how subtitles should be included: * 'auto' - Compute the appropriate subtitle setting automatically * 'burn' - Burn the selected subtitle; auto if no selected subtitle * 'none' - Ignore all subtitle streams * 'sidecar' - The selected subtitle should be provided as a sidecar * 'embedded' - The selected subtitle should be provided as an embedded stream * 'segmented' - The selected subtitle should be provided as a segmented stream"
          in: query
          schema:
            type: string
            enum:
              - auto
              - burn
              - none
              - sidecar
              - embedded
              - segmented
              - unknown
          example: burn
        - name: maxVideoBitrate
          description: Client-side maximum video bitrate cap in kbps
          in: query
          schema:
            type: integer
        - name: videoResolution
          description: Cap resolution string (e.g. 1920x1080)
          in: query
          schema:
            type: string
        - name: copyts
          description: Copy timestamps instead of re-encoding them
          in: query
          schema:
            $ref: "#/components/schemas/BoolInt"
        - name: videoBitrate
          description: Target video bitrate (in kbps).
          in: query
          schema:
            type: integer
            minimum: 0
          example: 12000
        - name: videoQuality
          description: Target photo quality.
          in: query
          schema:
            type: integer
            minimum: 0
            maximum: 99
          example: 50
        - name: X-Plex-Client-Identifier
          description: Unique per client.
          in: header
          required: true
          schema:
            type: string
        - name: X-Plex-Client-Profile-Extra
          description: See [Profile Augmentations](#section/API-Info/Profile-Augmentations) .
          in: header
          schema:
            type: string
          example: add-limitation(scope=videoCodec&scopeName=*&type=upperBound&name=video.frameRate&value=60&replace=true)+append-transcode-target-codec(type=videoProfile&context=streaming&videoCodec=h264%2Chevc&audioCodec=aac&protocol=dash)
        - name: X-Plex-Client-Profile-Name
          description: Which built in Client Profile to use in the decision. Generally should only be used to specify the Generic profile.
          in: header
          schema:
            type: string
          example: generic
        - name: X-Plex-Device
          description: Device the client is running on
          in: header
          schema:
            type: string
          example: Windows
        - name: X-Plex-Model
          description: Model of the device the client is running on
          in: header
          schema:
            type: string
          example: standalone
        - name: X-Plex-Platform
          description: Client Platform
          in: header
          schema:
            type: string
          example: Chrome
        - name: X-Plex-Platform-Version
          description: Client Platform Version
          in: header
          schema:
            type: string
          example: 135
        - name: X-Plex-Session-Identifier
          description: Unique per client playback session.  Used if a client can playback multiple items at a time (such as a browser with multiple tabs)
          in: header
          schema:
            type: string
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MediaContainerWithDecision"
        '400':
          $ref: "#/components/responses/400"
        '401':
          $ref: "#/components/responses/401"
  /{transcodeType}/:/transcode/universal/fallback:
    post:
      operationId: triggerFallback
      summary: Manually trigger a transcoder fallback
      tags:
        - Transcoder
      description: 'Manually trigger a transcoder fallback ex: HEVC to h.264 or hw to sw'
      parameters:
        - $ref: "#/components/parameters/accepts"
        - $ref: "#/components/parameters/X-Plex-Client-Identifier"
        - $ref: "#/components/parameters/X-Plex-Product"
        - $ref: "#/components/parameters/X-Plex-Version"
        - $ref: "#/components/parameters/X-Plex-Platform"
        - $ref: "#/components/parameters/X-Plex-Platform-Version"
        - $ref: "#/components/parameters/X-Plex-Device"
        - $ref: "#/components/parameters/X-Plex-Model"
        - $ref: "#/components/parameters/X-Plex-Device-Vendor"
        - $ref: "#/components/parameters/X-Plex-Device-Name"
        - $ref: "#/components/parameters/X-Plex-Marketplace"
        - $ref: "#/components/parameters/transcodeType"
        - $ref: "#/components/parameters/transcodeSessionId"
      responses:
        '200':
          $ref: "#/components/responses/200"
        '404':
          description: Session ID does not exist
          content:
            text/html: {}
        '412':
          description: Transcode could not fallback
          content:
            text/html: {}
        '500':
          description: Transcode failed to fallback
          content:
            text/html: {}
  /{transcodeType}/:/transcode/universal/subtitles:
    get:
      operationId: transcodeSubtitles
      summary: Transcode subtitles
      tags:
        - Transcoder
      description: Only transcode subtitle streams.
      parameters:
        - $ref: "#/components/parameters/accepts"
        - $ref: "#/components/parameters/X-Plex-Client-Identifier"
        - $ref: "#/components/parameters/X-Plex-Product"
        - $ref: "#/components/parameters/X-Plex-Version"
        - $ref: "#/components/parameters/X-Plex-Platform"
        - $ref: "#/components/parameters/X-Plex-Platform-Version"
        - $ref: "#/components/parameters/X-Plex-Device"
        - $ref: "#/components/parameters/X-Plex-Model"
        - $ref: "#/components/parameters/X-Plex-Device-Vendor"
        - $ref: "#/components/parameters/X-Plex-Device-Name"
        - $ref: "#/components/parameters/X-Plex-Marketplace"
        - $ref: "#/components/parameters/transcodeType"
        - $ref: "#/components/parameters/transcodeSessionId"
        - $ref: "#/components/parameters/advancedSubtitles"
        - name: platform
          description: Client platform (some clients send this in addition to headers).
          in: query
          schema:
            type: string
        - name: audioBoost
          description: Percentage of original audio loudness to use when transcoding (100 is equivalent to original volume, 50 is half, 200 is double, etc)
          in: query
          schema:
            type: integer
            minimum: 1
          example: 50
        - name: audioChannelCount
          description: Target video number of audio channels.
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 8
          example: 5
        - name: autoAdjustQuality
          description: Indicates the client supports ABR.
          in: query
          schema:
            $ref: "#/components/schemas/BoolInt"
          example: 1
        - name: autoAdjustSubtitle
          description: Indicates if the server should adjust subtitles based on Voice Activity Data.
          in: query
          schema:
            $ref: "#/components/schemas/BoolInt"
          example: 1
        - name: directPlay
          description: Indicates the client supports direct playing the indicated content.
          in: query
          schema:
            $ref: "#/components/schemas/BoolInt"
          example: 1
        - name: directStream
          description: Indicates the client supports direct streaming the video of the indicated content.
          in: query
          schema:
            $ref: "#/components/schemas/BoolInt"
          example: 1
        - name: directStreamAudio
          description: Indicates the client supports direct streaming the audio of the indicated content.
          in: query
          schema:
            $ref: "#/components/schemas/BoolInt"
          example: 1
        - name: disableResolutionRotation
          description: Indicates if resolution should be adjusted for orientation.
          in: query
          schema:
            $ref: "#/components/schemas/BoolInt"
          example: 1
        - name: hasMDE
          description: Ignore client profiles when determining if direct play is possible. Only has an effect when directPlay=1 and both mediaIndex and partIndex are specified and neither are -1
          in: query
          schema:
            $ref: "#/components/schemas/BoolInt"
          example: 1
        - name: location
          description: Network type of the client, can be used to help determine target bitrate.
          in: query
          schema:
            type: string
            enum:
              - lan
              - wan
              - cellular
          example: wan
        - name: mediaBufferSize
          description: Buffer size used in playback (in KB). Clients should specify a lower bound if not known exactly. This value could make the difference between transcoding and direct play on bandwidth constrained networks.
          in: query
          schema:
            type: integer
          example: 102400
        - name: mediaIndex
          description: Index of the media to transcode. -1 or not specified indicates let the server choose.
          in: query
          schema:
            type: integer
          example: 0
        - name: musicBitrate
          description: Target bitrate for audio only files (in kbps, used to transcode).
          in: query
          schema:
            type: integer
            minimum: 0
          example: 5000
        - name: offset
          description: Offset from the start of the media (in seconds).
          in: query
          schema:
            type: number
          example: 90.5
        - name: partIndex
          description: Index of the part to transcode. -1 or not specified indicates the server should join parts together in a transcode
          in: query
          schema:
            type: integer
          example: 0
        - name: path
          description: Internal PMS path of the media to transcode.
          in: query
          schema:
            type: string
          example: /library/metadata/151671
        - name: peakBitrate
          description: Maximum bitrate (in kbps) to use in ABR.
          in: query
          schema:
            type: integer
            minimum: 0
          example: 12000
        - name: photoResolution
          description: Target photo resolution.
          in: query
          schema:
            type: string
            pattern: ^\d[x:]\d$
          example: 1080x1080
        - name: protocol
          description: "Indicates the network streaming protocol to be used for the transcode session: * 'http' - include the file in the http response such as MKV streaming * 'hls' - hls stream (RFC 8216) * 'dash' - dash stream (ISO/IEC 23009-1:2022)"
          in: query
          schema:
            type: string
            enum:
              - http
              - hls
              - dash
          example: dash
        - name: secondsPerSegment
          description: Number of seconds to include in each transcoded segment
          in: query
          schema:
            type: integer
          example: 5
        - name: subtitleSize
          description: Percentage of original subtitle size to use when burning subtitles (100 is equivalent to original size, 50 is half, ect)
          in: query
          schema:
            type: integer
            minimum: 1
          example: 50
        - name: subtitles
          description: "Indicates how subtitles should be included: * 'auto' - Compute the appropriate subtitle setting automatically * 'burn' - Burn the selected subtitle; auto if no selected subtitle * 'none' - Ignore all subtitle streams * 'sidecar' - The selected subtitle should be provided as a sidecar * 'embedded' - The selected subtitle should be provided as an embedded stream * 'segmented' - The selected subtitle should be provided as a segmented stream"
          in: query
          schema:
            type: string
            enum:
              - auto
              - burn
              - none
              - sidecar
              - embedded
              - segmented
              - unknown
          example: burn
        - name: maxVideoBitrate
          description: Client-side maximum video bitrate cap in kbps
          in: query
          schema:
            type: integer
        - name: videoResolution
          description: Cap resolution string (e.g. 1920x1080)
          in: query
          schema:
            type: string
        - name: copyts
          description: Copy timestamps instead of re-encoding them
          in: query
          schema:
            $ref: "#/components/schemas/BoolInt"
        - name: videoBitrate
          description: Target video bitrate (in kbps).
          in: query
          schema:
            type: integer
            minimum: 0
          example: 12000
        - name: videoQuality
          description: Target photo quality.
          in: query
          schema:
            type: integer
            minimum: 0
            maximum: 99
          example: 50
        - name: X-Plex-Client-Identifier
          description: Unique per client.
          in: header
          required: true
          schema:
            type: string
        - name: X-Plex-Client-Profile-Extra
          description: See [Profile Augmentations](#section/API-Info/Profile-Augmentations) .
          in: header
          schema:
            type: string
          example: add-limitation(scope=videoCodec&scopeName=*&type=upperBound&name=video.frameRate&value=60&replace=true)+append-transcode-target-codec(type=videoProfile&context=streaming&videoCodec=h264%2Chevc&audioCodec=aac&protocol=dash)
        - name: X-Plex-Client-Profile-Name
          description: Which built in Client Profile to use in the decision. Generally should only be used to specify the Generic profile.
          in: header
          schema:
            type: string
          example: generic
        - name: X-Plex-Device
          description: Device the client is running on
          in: header
          schema:
            type: string
          example: Windows
        - name: X-Plex-Model
          description: Model of the device the client is running on
          in: header
          schema:
            type: string
          example: standalone
        - name: X-Plex-Platform
          description: Client Platform
          in: header
          schema:
            type: string
          example: Chrome
        - name: X-Plex-Platform-Version
          description: Client Platform Version
          in: header
          schema:
            type: string
          example: 135
        - name: X-Plex-Session-Identifier
          description: Unique per client playback session.  Used if a client can playback multiple items at a time (such as a browser with multiple tabs)
          in: header
          schema:
            type: string
      responses:
        '200':
          description: Transcoded subtitle file
          content:
            text/srt:
              example: |
                1
                00:00:02,499 --> 00:00:06,416
                [SERENE MUSIC]

                2
                00:00:11,791 --> 00:00:13,958
                [BROOK BABBLES] 
                [FLY BUZZES]

                3
                00:00:16,166 --> 00:00:17,666
                [BIRD TWEETS]

                4
                00:00:17,666 --> 00:00:18,708
                [WINGS FLAP]

                5
                00:00:19,833 --> 00:00:20,374
                [BIRD TWEETS] 
                [WINGS FLAP]

                6
                00:00:20,374 --> 00:00:21,041
                [THUD]

                7
                00:00:21,374 --> 00:00:22,249
                [THUD]

                8
                00:00:22,249 --> 00:00:23,083
                [SQUIRREL LAUGHS]

                9
                00:00:26,249 --> 00:00:27,541
                [SNORES]

                10
                00:00:29,416 --> 00:00:30,708
                [SNORES]

                11
                00:00:32,749 --> 00:00:34,041
                [BUNNY SNORES]

                12
                00:00:35,916 --> 00:00:37,249
                [BUNNY SNORES]
        '400':
          $ref: "#/components/responses/400"
        '403':
          $ref: "#/components/responses/403"
        '404':
          $ref: "#/components/responses/404"
