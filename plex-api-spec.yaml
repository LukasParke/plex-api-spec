    post:
      operationId: postUsersSignInData
      summary: Get User Sign In Data
      tags:
        - Authentication
      description: Sign in user with username and password and return user data with Plex authentication token
      security: []
      servers:
        - url: https://plex.tv/api/v2
      parameters:
        - $ref: "#/components/parameters/accepts"
        - $ref: "#/components/parameters/X-Plex-Client-Identifier"
        - $ref: "#/components/parameters/X-Plex-Product"
        - $ref: "#/components/parameters/X-Plex-Version"
        - $ref: "#/components/parameters/X-Plex-Platform"
        - $ref: "#/components/parameters/X-Plex-Platform-Version"
        - $ref: "#/components/parameters/X-Plex-Device"
        - $ref: "#/components/parameters/X-Plex-Model"
        - $ref: "#/components/parameters/X-Plex-Device-Vendor"
        - $ref: "#/components/parameters/X-Plex-Device-Name"
        - $ref: "#/components/parameters/X-Plex-Marketplace"
      requestBody:
        description: Login credentials
        content:
          application/x-www-form-urlencoded:
            schema:
              type: object
              properties:
                login:
                  type: string
                  format: email
                  example: username@email.com
                password:
                  type: string
                  format: password
                  example: password123
                rememberMe:
                  type: boolean
                  default: false
                verificationCode:
                  type: string
                  example: '123456'
              required:
                - login
                - password
      responses:
        '201':
          description: Returns the user account data with a valid auth token
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/UserPlexAccount"
                  - type: object
                    properties:
                      pastSubscriptions:
                        type: array
                        items:
                          title: PastSubscription
                          type: object
                          properties:
                            type:
                              type: string
                              example: plexpass
                            billing:
                              type: object
                              properties:
                                internalPaymentMethod:
                                  type: object
                                paymentMethodId:
                                  type:
                                    - integer
                                    - 'null'
                              required:
                                - internalPaymentMethod
                                - paymentMethodId
                            canceled:
                              type: boolean
                              default: false
                              example: false
                            canConvert:
                              type: boolean
                              default: false
                              example: false
                            canDowngrade:
                              type: boolean
                              default: false
                              example: false
                            canReactivate:
                              type: boolean
                              default: false
                              example: false
                            canUpgrade:
                              type: boolean
                              default: false
                              example: false
                            endsAt:
                              oneOf:
                                - $ref: "#/components/schemas/PlexDateTime"
                                - type: 'null'
                            gracePeriod:
                              type: boolean
                              default: false
                              example: false
                            id:
                              type:
                                - string
                                - 'null'
                            mode:
                              type:
                                - string
                                - 'null'
                            onHold:
                              type: boolean
                              default: false
                              example: false
                            renewsAt:
                              oneOf:
                                - $ref: "#/components/schemas/PlexDateTime"
                                - type: 'null'
                            state:
                              type: string
                              enum:
                                - ended
                              example: ended
                              x-speakeasy-unknown-values: allow
                            transfer:
                              type:
                                - string
                                - 'null'
                          required:
                            - id
                            - mode
                            - renewsAt
                            - endsAt
                            - canceled
                            - gracePeriod
                            - onHold
                            - canReactivate
                            - canUpgrade
                            - canDowngrade
                            - canConvert
                            - type
                            - transfer
                            - state
                            - billing
                      trials:
                        type: array
                        items:
                          type: object
                    required:
                      - pastSubscriptions
                      - trials
        '400':
          description: Bad Request - A parameter was not specified, or was specified incorrectly.
          content:
