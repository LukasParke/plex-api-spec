    Media:
      description: "`Media` represents an one or more media files (parts) and is a child of a metadata item. There aren't necessarily any guaranteed attributes on media elements since the attributes will vary based on the type. The possible attributes are not documented here, but they typically have self-evident names. High-level media information that can be used for badging and flagging, such as `videoResolution` and codecs, is included on the media element."
      type: object
      additionalProperties: true
      properties:
        aspectRatio:
          type: number
          format: float
          example: 2.35
        audioChannels:
          type: integer
          format: int32
          example: 2
        audioCodec:
          type: string
          example: aac
