    UserProfile:
      title: UserProfile
      type: object
      properties:
        autoSelectAudio:
          description: If the account has automatically select audio and subtitle tracks enabled
          type: boolean
          default: true
          example: true
        autoSelectSubtitle:
          allOf:
            - type: integer
              format: int32
              enum:
                - 0
                - 1
                - 2
              default: 0
              example: 1
              x-speakeasy-enums:
                - MANUALLY_SELECTED
                - SHOWN_WITH_FOREIGN_AUDIO
                - ALWAYS_ENABLED
            - description: The auto-select subtitle mode (0 = Manually selected, 1 = Shown with foreign audio, 2 = Always enabled)
        defaultAudioAccessibility:
          allOf:
            - type: integer
              format: int32
              enum:
                - 0
                - 1
                - 2
                - 3
              default: 0
              example: 0
              x-speakeasy-enums:
                - PREFER_NON_ACCESSIBILITY
                - PREFER_ACCESSIBILITY
                - ONLY_ACCESSIBILITY
                - ONLY_NON_ACCESSIBILITY
            - description: The audio accessibility mode (0 = Prefer non-accessibility audio, 1 = Prefer accessibility audio, 2 = Only show accessibility audio, 3 = Only show non-accessibility audio)
        defaultAudioLanguage:
          description: The preferred audio language for the account
          type:
            - string
            - 'null'
          example: ja
        defaultAudioLanguages:
          description: The preferred audio languages for the account
          type:
            - array
            - 'null'
          example: null
          items:
            type: string
        defaultSubtitleAccessibility:
          allOf:
            - type: integer
              format: int32
              enum:
                - 0
                - 1
                - 2
                - 3
              default: 0
              example: 1
              x-speakeasy-enums:
                - PREFER_NON_SDH
                - PREFER_SDH
                - ONLY_SDH
                - ONLY_NON_SDH
            - description: The subtitles for the deaf or hard-of-hearing (SDH) searches mode (0 = Prefer non-SDH subtitles, 1 = Prefer SDH subtitles, 2 = Only show SDH subtitles, 3 = Only show non-SDH subtitles)
        defaultSubtitleForced:
          allOf:
            - type: integer
              format: int32
              enum:
                - 0
                - 1
                - 2
                - 3
              default: 0
              example: 1
              x-speakeasy-enums:
                - PREFER_NON_FORCED
                - PREFER_FORCED
                - ONLY_FORCED
                - ONLY_NON_FORCED
            - description: The forced subtitles searches mode (0 = Prefer non-forced subtitles, 1 = Prefer forced subtitles, 2 = Only show forced subtitles, 3 = Only show non-forced subtitles)
        defaultSubtitleLanguage:
          description: The preferred subtitle language for the account
          type:
            - string
            - 'null'
          example: en
        defaultSubtitleLanguages:
          description: The preferred subtitle languages for the account
          type:
            - array
            - 'null'
          example: null
          items:
            type: string
        mediaReviewsLanguages:
          description: The languages for media reviews visibility
          type:
            - array
            - 'null'
          example: null
          items:
            type: string
        mediaReviewsVisibility:
          allOf:
            - type: integer
              format: int32
              enum:
                - 0
                - 1
                - 2
                - 3
              default: 0
              example: 1
              x-speakeasy-enums:
                - NO_ONE
                - CRITICS_ONLY
                - PLEX_USERS_ONLY
                - PLEX_USERS_AND_CRITICS
            - description: Whether or not the account has media reviews visibility enabled
        watchedIndicator:
          allOf:
            - type: integer
              format: int32
              enum:
                - 0
                - 1
                - 2
                - 3
              default: 0
              example: 1
              x-speakeasy-enums:
                - NONE
                - MOVIES_AND_TV_SHOWS
                - MOVIES
                - TV_SHOWS
            - description: Whether or not media watched indicators are enabled (little orange dot on media)
      required:
        - autoSelectAudio
        - defaultAudioLanguage
        - defaultSubtitleLanguage
        - autoSelectSubtitle
        - defaultSubtitleAccessibility
        - defaultSubtitleForced
        - watchedIndicator
        - mediaReviewsVisibility
    WebhookPayload:
      description: Payload delivered by Plex to configured webhook URLs.
      type: object
      properties:
        Account:
          type: object
          properties:
            title:
              type: string
              example: Plex User
            id:
              type: integer
              example: 1
            thumb:
              type: string
              example: https://plex.tv/users/1/thumb
        event:
          description: Event type that triggered the webhook.
          type: string
          enum:
            - media.play
            - media.pause
            - media.resume
            - media.stop
            - media.scrobble
            - media.rate
            - library.new
            - library.on.deck
          example: media.play
        Metadata:
          description: The media item associated with the event. Shape varies by event type.
          type: object
        owner:
          type: boolean
          example: true
        Player:
          type: object
          properties:
            title:
              type: string
              example: Chrome
            local:
              type: boolean
              example: true
            publicAddress:
              type: string
              example: 192.168.1.100
            uuid:
              type: string
              example: player-uuid-123
        Server:
          type: object
          properties:
            title:
              type: string
              example: My Server
            uuid:
              type: string
              example: 5d776d057ae4e7001f65e7d0
        user:
          type: boolean
          example: true
x-speakeasy-retries:
  backoff:
    exponent: 2
    initialInterval: 1000
    maxElapsedTime: 300000
    maxInterval: 30000
  retryConnectionErrors: true
  statusCodes:
    - '429'
  strategy: backoff
