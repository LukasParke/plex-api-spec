          description: ISO language code.
          type: string
          example: eng
        languageTag:
          description: Language tag (e.g., en).
          type: string
          example: en
        level:
          description: Video level.
          type: integer
          format: int32
          example: 150
        loudness:
          description: Integrated loudness in LUFS.
          type: number
          example: -14
        lra:
          description: Loudness range in LU.
          type: number
          example: 8.5
        minLines:
          description: Minimum lines in the lyric file.
          type: integer
          example: 10
        original:
          description: Indicates if this is the original stream.
          type: boolean
          example: true
        peak:
          description: Track peak amplitude.
          type: number
          example: 0.98
        perfectMatch:
          description: Whether the subtitle is an exact match.
          type: boolean
          example: true
        profile:
          description: Video profile.
          type: string
          example: main 10
        provider:
