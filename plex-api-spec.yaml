          description: Frame rate of the stream.
          type: number
          format: float
          example: 23.976
        gain:
          description: Track replay gain in dB.
          type: number
          example: -6.2
        hasScalingMatrix:
          type: boolean
          example: false
        headerCompression:
          description: Indicates whether header compression is enabled.
          type: boolean
          example: true
        hearingImpaired:
          description: Indicates if the stream is for the hearing impaired.
          type: boolean
          example: true
        height:
          description: Height of the video stream.
