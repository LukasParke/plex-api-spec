      oneOf:
        - type: boolean
        - type: string
          enum:
            - '0'
            - '1'
    BadRequestErrorResponse:
      type: object
      properties:
        errors:
          type: array
          items:
            type: object
            properties:
              code:
                type: integer
                format: int32
                example: 1000
              message:
                type: string
