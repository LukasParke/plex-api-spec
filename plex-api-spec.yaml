              schema:
                type: object
                properties:
                  MediaContainer:
                    allOf:
                      - $ref: "#/components/schemas/MediaContainer"
                      - type: object
                        properties:
                          PlayQueueGenerator:
                            type: array
                            items:
                              type: object
                              properties:
                                type:
                                  description: |-
                                    The type of playlist generator.

                                      - -1: A smart playlist generator
                                      - 42: A optimized version generator
                                  type: integer
                                  enum:
                                    - -1
                                    - 42
                                changedAt:
                                  type: integer
                                createdAt:
                                  type: integer
                                id:
                                  type: integer
                                playlistID:
                                  type: integer
                                updatedAt:
                                  type: integer
                                uri:
                                  description: The URI indicating the search for this generator
                                  type: string
