          type: integer
          format: int32
          example: 150192
        has64bitOffsets:
          type: boolean
          example: false
        hasVoiceActivity:
          description: |-
            Voice activity detection availability flag returned by PMS.
            PMS may return this as a boolean or as string values (`"0"` or `"1"`).
          example: '0'
          oneOf:
            - type: boolean
            - type: string
              enum:
                - '0'
                - '1'
        height:
          type: integer
          format: int32
          example: 544
        id:
          type: integer
          format: int64
          example: 1
        optimizedForStreaming:
          type: integer
          format: int32
          enum:
            - 0
            - 1
        Part:
          type: array
          items:
            $ref: "#/components/schemas/Part"
        selected:
          description: Whether this media version is selected for playback.
          type: boolean
          example: true
        uuid:
          description: Unique identifier for this media instance.
          type: string
          example: 5d776d057ae4e7001f65e7d0
        videoCodec:
          type: string
          example: h264
        videoFrameRate:
          type: string
          example: 24p
        videoProfile:
          type: string
          example: main
        videoResolution:
          type: string
          example: '720'
        width:
          type: integer
          format: int32
          example: 1280
      required:
        - id
    MediaContainer:
      description: |-
        `MediaContainer` is the root element of most Plex API responses. It serves as a generic container for various types of content (Metadata, Hubs, Directories, etc.) and includes pagination information (offset, size, totalSize) when applicable.
        Common attributes: - identifier: Unique identifier for this container - size: Number of items in this response page - totalSize: Total number of items available (for pagination) - offset: Starting index of this page (for pagination)
        The container often "hoists" common attributes from its children. For example, if all tracks in a container share the same album title, the `parentTitle` attribute may appear on the MediaContainer rather than being repeated on each track.
      type: object
      properties:
        identifier:
          type: string
        offset:
          description: The offset of where this container page starts among the total objects available. Also provided in the `X-Plex-Container-Start` header.
          type: integer
        size:
          type: integer
        totalSize:
          description: The total size of objects available. Also provided in the `X-Plex-Container-Total-Size` header.
          type: integer
    MediaContainerWithArtwork:
      type: object
      properties:
        MediaContainer:
          allOf:
            - $ref: "#/components/schemas/MediaContainer"
            - type: object
              properties:
                Metadata:
                  type: array
                  items:
                    type: object
                    additionalProperties: true
                    properties:
                      title:
                        description: The title of the item
                        type: string
                      type:
                        type: string
                        enum:
                          - image
                      key:
                        description: The path to the artwork
                        type: string
    MediaContainerWithDecision:
      description: |-
        `MediaContainer` is commonly found as the root of a response and is a pretty generic container. Common attributes include `identifier` and things related to paging (`offset`, `size`, `totalSize`).

        It is also common for a `MediaContainer` to contain attributes "hoisted" from its children. If every element in the container would have had the same attribute, then that attribute can be present on the container instead of being repeated on every element. For example, an album's list of tracks might include `parentTitle` on the container since all of the tracks have the same album title. A container may have a `source` attribute when all of the items came from the same source. Generally speaking, when looking for an attribute on an item, if the attribute wasn't found then the container should be checked for that attribute as well.
      type: object
      properties:
        MediaContainer:
          allOf:
            - $ref: "#/components/schemas/MediaContainer"
            - type: object
              properties:
                availableBandwidth:
                  description: The maximum available bitrate when the decision was rendered.
                  type: integer
                directPlayDecisionCode:
                  type: integer
                directPlayDecisionText:
                  type: string
                generalDecisionCode:
                  description: The overall decision. 1xxx are playback can succeed, 2xxx are a general error (such as insufficient bandwidth), 3xxx are errors in direct play, and 4xxx are errors in transcodes. Same codes are used in all.
                  type: integer
                generalDecisionText:
                  type: string
                mdeDecisionCode:
                  description: The code indicating the status of evaluation of playback when client indicates `hasMDE=1`
                  type: integer
                mdeDecisionText:
                  description: Descriptive text for the above code
                  type: string
                Metadata:
                  type: array
                  items:
                    allOf:
                      - $ref: "#/components/schemas/Metadata"
                      - type: object
                        properties:
                          Media:
                            type: array
                            items:
                              allOf:
                                - $ref: "#/components/schemas/Media"
                                - type: object
                                  properties:
                                    abr:
                                      type: boolean
                                    Part:
                                      type: array
                                      items:
                                        allOf:
                                          - $ref: "#/components/schemas/Part"
                                          - type: object
                                            properties:
                                              decision:
                                                type: string
                                                enum:
                                                  - directplay
                                                  - transcode
                                                  - none
                                              selected:
                                                type: boolean
                                              Stream:
                                                type: array
                                                items:
                                                  allOf:
                                                    - $ref: "#/components/schemas/Stream"
                                                    - type: object
                                                      properties:
                                                        decision:
                                                          type: string
                                                          enum:
                                                            - copy
                                                            - transcode
                                                            - burn
                                                            - unavailable
                                                            - ignore
                                                            - none
                                                        location:
                                                          type: string
                                                          enum:
                                                            - direct
                                                            - sidecar-subs
                                                            - segments-video
                                                            - segments-audio
                                                            - segments-av
                                                            - segments-subs
                                                            - embedded
                                                            - sidecar
                                    resourceSession:
                                      type: string
                                    selected:
                                      type: boolean
                transcodeDecisionCode:
                  type: integer
                transcodeDecisionText:
                  type: string
    MediaContainerWithDevice:
      type: object
      properties:
        MediaContainer:
          allOf:
            - $ref: "#/components/schemas/MediaContainer"
            - type: object
              properties:
                Device:
