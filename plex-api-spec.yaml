          format: int32
          example: 1
        samplingRate:
          description: Sampling rate for the audio stream.
          type: integer
          format: int32
          example: 48000
        scanType:
          type: string
          example: progressive
        score:
          description: Subtitle match confidence score (0-100).
          type: number
          example: 95.5
        selected:
          description: Indicates if this stream is selected (applicable for audio streams).
          type: boolean
          example: true
        sourceKey:
          description: Source identifier for the subtitle.
          type: string
          example: opensubtitles
        startRamp:
          description: Loudness ramp start type.
          type: string
          example: none
        streamIdentifier:
          type: integer
          format: int32
          example: 1
        streamType:
          allOf:
            - type: integer
              format: int32
              enum:
                - 1
                - 2
                - 3
              example: 1
              x-speakeasy-enums:
                - VIDEO
                - AUDIO
                - SUBTITLE
