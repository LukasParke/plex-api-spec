    Stream:
      description: '`Stream` represents a particular stream from a media item, such as the video stream, audio stream, or subtitle stream. The stream may either be part of the file represented by the parent `Part` or, especially for subtitles, an external file. The stream contains more detailed information about the specific stream. For example, a video may include the `aspectRatio` at the `Media` level, but detailed information about the video stream like the color space will be included on the `Stream` for the video stream.  Note that photos do not have streams (mostly as an optimization).'
      type: object
      additionalProperties: true
      properties:
        title:
          description: Optional title for the stream (e.g., language variant).
          type: string
          example: SDH
        format:
          description: Format of the stream (e.g., srt).
          type: string
          example: srt
        default:
          description: Indicates if this stream is default.
          type: boolean
          example: true
        albumGain:
          description: ReplayGain album gain in dB.
          type: number
          example: -8.5
        albumPeak:
          description: ReplayGain album peak amplitude.
          type: number
          example: 0.95
        albumRange:
          description: ReplayGain album dynamic range in dB.
          type: number
          example: 12.3
        audioChannelLayout:
          description: Audio channel layout.
          type: string
          example: 5.1(side)
        bitDepth:
          description: Bit depth of the video stream.
          type: integer
          format: int32
          example: 10
        bitrate:
          description: Bitrate of the stream.
          type: integer
          format: int32
          example: 24743
        bitrateMode:
          description: Audio bitrate mode (cbr or vbr).
          type: string
          enum:
            - cbr
            - vbr
          example: vbr
        canAutoSync:
          description: Indicates if the stream can auto-sync.
          type: boolean
          example: false
          oneOf:
            - type: boolean
            - type: string
              enum:
                - '0'
                - '1'
        channels:
          description: Number of audio channels (for audio streams).
          type: integer
          format: int32
          example: 6
        chromaLocation:
          description: Chroma sample location.
          type: string
          example: topleft
        chromaSubsampling:
          description: Chroma subsampling format.
          type: string
          example: 14520
        closedCaptions:
          type: boolean
          example: true
        codec:
          description: Codec used by the stream.
          type: string
          example: hevc
        codedHeight:
          description: Coded video height.
          type: integer
          format: int32
          example: 1608
        codedWidth:
          description: Coded video width.
          type: integer
          format: int32
          example: 3840
        colorPrimaries:
          description: Color primaries used.
          type: string
          example: bt2020
        colorRange:
          description: Color range (e.g., tv).
          type: string
          example: tv
        colorSpace:
          description: Color space.
          type: string
          example: bt2020nc
        colorTrc:
          description: Color transfer characteristics.
          type: string
          example: smpte2084
        displayTitle:
          description: Display title for the stream.
          type: string
          example: 4K DoVi/HDR10 (HEVC Main 10)
        DOVIBLCompatID:
          description: Dolby Vision BL compatibility ID.
          type: integer
          format: int32
          example: 1
        DOVIBLPresent:
          description: Indicates if Dolby Vision BL is present.
          type: boolean
          example: true
        DOVIELPresent:
          description: Indicates if Dolby Vision EL is present.
          type: boolean
          example: false
        DOVILevel:
          description: Dolby Vision level.
          type: integer
          format: int32
          example: 6
        DOVIPresent:
          description: Indicates if Dolby Vision is present.
          type: boolean
          example: true
        DOVIProfile:
          description: Dolby Vision profile.
          type: integer
          format: int32
          example: 8
        DOVIRPUPresent:
          description: Indicates if Dolby Vision RPU is present.
          type: boolean
          example: true
        DOVIVersion:
          description: Dolby Vision version.
          type: string
          example: '1.0'
        dub:
          description: Indicates if the stream is a dub.
          type: boolean
          example: true
