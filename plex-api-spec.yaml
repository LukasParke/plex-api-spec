components:
  securitySchemes:
    clientIdentifier:
      name: X-Plex-Client-Identifier
      description: |-
        An opaque identifier unique to the client. Required for OAuth PIN flows
        and JWT device registration endpoints.
      type: apiKey
      in: header
    token:
      name: X-Plex-Token
      description: |-
        The token which identifies the user accessing the PMS. This can be either:
        - A traditional access token obtained from plex.tv
        - A JWT token obtained through the JWT authentication flow

        JWT tokens provide better security with:
        - Short-lived tokens (7 days expiration)
        - Public-key cryptography (ED25519)
        - Better clock synchronization
        - Individual device revocation capability
      type: apiKey
      in: header
  parameters:
    accepts:
      name: accepts
      description: Indicates the client accepts the indicated media types
      in: header
      schema:
        type: string
        default: application/xml
        enum:
          - application/json
          - application/xml
    advancedSubtitles:
      name: advancedSubtitles
      description: "Indicates how incompatible advanced subtitles (such as ass/ssa) should be included: * 'burn' - Burn incompatible advanced text subtitles into the video stream * 'text' - Transcode incompatible advanced text subtitles to a compatible text format, even if some markup is lost"
      in: query
      schema:
        type: string
        enum:
          - burn
          - text
          - unknown
      example: burn
    audioBoost:
      name: audioBoost
      description: Percentage of original audio loudness to use when transcoding (100 is equivalent to original volume, 50 is half, 200 is double, etc)
      in: query
      schema:
        type: integer
        minimum: 1
      example: 50
    audioChannelCount:
      name: audioChannelCount
      description: Target video number of audio channels.
      in: query
      schema:
        type: integer
        minimum: 1
        maximum: 8
      example: 5
    autoAdjustQuality:
      name: autoAdjustQuality
      description: Indicates the client supports ABR.
      in: query
      schema:
        $ref: "#/components/schemas/BoolInt"
      example: 1
    autoAdjustSubtitle:
      name: autoAdjustSubtitle
      description: Indicates if the server should adjust subtitles based on Voice Activity Data.
      in: query
      schema:
        $ref: "#/components/schemas/BoolInt"
      example: 1
    composite:
      name: composite
      in: query
      schema:
        type: object
        properties:
          type:
            description: Limit composite to specified metadata types
            type: integer
          format:
            description: The image type
            type: string
            enum:
              - jpg
              - png
          backgroundColor:
            description: 6 character hex RGB value for background color for image
            type: string
          border:
            description: The width of the intra-image border
            type: integer
          cols:
            description: Number of columns to construct in the composite image
            type: integer
          crop:
            description: Where to crop source images to fit into composite image proportions
            type: string
            enum:
              - center
              - top
          height:
            description: The height of the image
            type: integer
          media:
            description: The default image type to use as the sources
            type: string
            enum:
              - thumb
              - art
              - banner
          repeat:
            description: Allow repetion of images if there are not enough source images to fill grid
            type: boolean
          rows:
            description: Number of rows to construct in the composite image
            type: integer
          width:
            description: The width of the image
            type: integer
    count:
      name: count
      description: Limit results to count items
      in: query
      schema:
        type: integer
    directPlay:
      name: directPlay
      description: Indicates the client supports direct playing the indicated content.
      in: query
      schema:
        $ref: "#/components/schemas/BoolInt"
      example: 1
    directStream:
      name: directStream
      description: Indicates the client supports direct streaming the video of the indicated content.
      in: query
      schema:
        $ref: "#/components/schemas/BoolInt"
      example: 1
    directStreamAudio:
      name: directStreamAudio
      description: Indicates the client supports direct streaming the audio of the indicated content.
      in: query
      schema:
        $ref: "#/components/schemas/BoolInt"
      example: 1
    disableResolutionRotation:
      name: disableResolutionRotation
      description: Indicates if resolution should be adjusted for orientation.
      in: query
      schema:
        $ref: "#/components/schemas/BoolInt"
      example: 1
    hasMDE:
      name: hasMDE
      description: Ignore client profiles when determining if direct play is possible. Only has an effect when directPlay=1 and both mediaIndex and partIndex are specified and neither are -1
      in: query
      schema:
        $ref: "#/components/schemas/BoolInt"
      example: 1
    location:
      name: location
      description: Network type of the client, can be used to help determine target bitrate.
      in: query
      schema:
        type: string
        enum:
          - lan
          - wan
          - cellular
      example: wan
    mediaBufferSize:
      name: mediaBufferSize
      description: Buffer size used in playback (in KB). Clients should specify a lower bound if not known exactly. This value could make the difference between transcoding and direct play on bandwidth constrained networks.
      in: query
      schema:
        type: integer
      example: 102400
    mediaIndex:
      name: mediaIndex
      description: Index of the media to transcode. -1 or not specified indicates let the server choose.
      in: query
      schema:
        type: integer
      example: 0
    mediaQuery:
      name: mediaQuery
      description: |-
        A querystring-based filtering language used to select subsets of media. Can be provided as an object with typed properties for type safety, or as a string for complex queries with operators and boolean logic.

        The query supports:
        - Fields: integer, boolean, tag, string, date, language
        - Operators: =, !=, ==, !==, <=, >=, >>=, <<= (varies by field type)
        - Boolean operators: & (AND), , (OR), push/pop (parentheses), or=1 (explicit OR)
        - Sorting: sort parameter with :desc, :nullsLast modifiers
        - Grouping: group parameter
        - Limits: limit parameter

        Examples:
        - Object format: `{type: 4, sourceType: 2, title: "24"}` → `type=4&sourceType=2&title=24`
        - String format: `type=4&sourceType=2&title==24` - type = 4 AND sourceType = 2 AND title = "24"
        - Complex: `push=1&index=1&or=1&rating=2&pop=1&duration=10` - (index = 1 OR rating = 2) AND duration = 10

        See [API Info section](#section/API-Info/Media-Queries) for detailed information on building media queries.
      in: query
      style: form
      explode: true
      schema:
        $ref: "#/components/schemas/MediaQuery"
    musicBitrate:
      name: musicBitrate
      description: Target bitrate for audio only files (in kbps, used to transcode).
      in: query
      schema:
        type: integer
        minimum: 0
      example: 5000
    offset:
      name: offset
      description: Offset from the start of the media (in seconds).
      in: query
      schema:
        type: number
      example: 90.5
    partIndex:
      name: partIndex
      description: Index of the part to transcode. -1 or not specified indicates the server should join parts together in a transcode
      in: query
      schema:
        type: integer
      example: 0
    path:
      name: path
      description: Internal PMS path of the media to transcode.
      in: query
      schema:
        type: string
      example: /library/metadata/151671
    peakBitrate:
      name: peakBitrate
      description: Maximum bitrate (in kbps) to use in ABR.
      in: query
      schema:
        type: integer
        minimum: 0
      example: 12000
    photoResolution:
      name: photoResolution
      description: Target photo resolution.
      in: query
      schema:
        type: string
        pattern: ^\d[x:]\d$
      example: 1080x1080
    protocol:
      name: protocol
      description: "Indicates the network streaming protocol to be used for the transcode session: * 'http' - include the file in the http response such as MKV streaming * 'hls' - hls stream (RFC 8216) * 'dash' - dash stream (ISO/IEC 23009-1:2022)"
      in: query
      schema:
        type: string
        enum:
          - http
          - hls
          - dash
      example: dash
    secondsPerSegment:
      name: secondsPerSegment
      description: Number of seconds to include in each transcoded segment
      in: query
      schema:
        type: integer
      example: 5
    smart:
      name: smart
      description: Whether this is a smart collection/playlist
      in: query
      schema:
        type: boolean
    subtitles:
      name: subtitles
      description: "Indicates how subtitles should be included: * 'auto' - Compute the appropriate subtitle setting automatically * 'burn' - Burn the selected subtitle; auto if no selected subtitle * 'none' - Ignore all subtitle streams * 'sidecar' - The selected subtitle should be provided as a sidecar * 'embedded' - The selected subtitle should be provided as an embedded stream * 'segmented' - The selected subtitle should be provided as a segmented stream"
      in: query
      schema:
        type: string
        enum:
          - auto
          - burn
          - none
          - sidecar
          - embedded
          - segmented
          - unknown
      example: burn
    subtitleSize:
      name: subtitleSize
      description: Percentage of original subtitle size to use when burning subtitles (100 is equivalent to original size, 50 is half, ect)
      in: query
      schema:
        type: integer
        minimum: 1
      example: 50
    title:
      name: title
      description: The title to filter by or assign
      in: query
      schema:
        type: string
    transcodeSessionId:
      name: transcodeSessionId
      description: Transcode session UUID
      in: query
      schema:
        type: string
    transcodeType:
      name: transcodeType
      description: Type of transcode media
      in: path
      required: true
      schema:
        type: string
        enum:
          - video
          - music
          - audio
          - subtitles
    type:
      name: type
      description: |-
        The type of media to retrieve or filter by.

        1 = movie
        2 = show
        3 = season
        4 = episode
        5 = artist
        6 = album
        7 = track
        8 = photo_album
        9 = photo

        E.g. A movie library will not return anything with type 3 as there are no seasons for movie libraries
      in: query
      schema:
        $ref: "#/components/schemas/MediaType"
      example: 2
    videoBitrate:
      name: videoBitrate
      description: Target video bitrate (in kbps).
      in: query
      schema:
        type: integer
        minimum: 0
      example: 12000
    videoQuality:
      name: videoQuality
      description: Target photo quality.
      in: query
      schema:
        type: integer
        minimum: 0
        maximum: 99
      example: 50
    videoResolution:
      name: videoResolution
      description: Target maximum video resolution.
      in: query
      schema:
        type: string
        pattern: ^\d[x:]\d$
      example: 1080x1080
    X-Plex-Client-Identifier:
      name: X-Plex-Client-Identifier
      description: An opaque identifier unique to the client
      in: header
      required: true
      schema:
        type: string
        example: abc123
      example: abc123
      x-speakeasy-name-override: Client-Identifier
    X-Plex-Container-Size:
      name: X-Plex-Container-Size
      description: |-
        The number of items to return. If not specified, all items will be returned.
        If the number of items exceeds the limit, the response will be paginated.
        By default this is 50
      in: query
      required: false
      schema:
        type: integer
        format: int32
        default: 50
      example: 50
    X-Plex-Container-Start:
      name: X-Plex-Container-Start
      description: |-
        The index of the first item to return. If not specified, the first item will be returned.
        If the number of items exceeds the limit, the response will be paginated.
        By default this is 0
      in: query
      required: false
      schema:
        type: integer
        format: int32
        default: 0
      example: 0
    X-Plex-Device:
      name: X-Plex-Device
      description: A relatively friendly name for the client device
      in: header
      schema:
        type: string
        example: Roku 3
      example: Roku 3
      x-speakeasy-name-override: Device
    X-Plex-Device-Name:
      name: X-Plex-Device-Name
      description: A friendly name for the client
      in: header
      schema:
        type: string
        example: Living Room TV
      example: Living Room TV
      x-speakeasy-name-override: Device-Name
    X-Plex-Device-Vendor:
      name: X-Plex-Device-Vendor
      description: The device vendor
      in: header
      schema:
        type: string
        example: Roku
      example: Roku
      x-speakeasy-name-override: Device-Vendor
    X-Plex-Marketplace:
      name: X-Plex-Marketplace
      description: The marketplace on which the client application is distributed
      in: header
      schema:
        type: string
        example: googlePlay
      example: googlePlay
      x-speakeasy-name-override: Marketplace
    X-Plex-Model:
      name: X-Plex-Model
      description: A potentially less friendly identifier for the device model
      in: header
      schema:
        type: string
        example: 4200X
      example: 4200X
      x-speakeasy-name-override: Model
    X-Plex-Platform:
      name: X-Plex-Platform
      description: The platform of the client
      in: header
      schema:
        type: string
        example: Roku
      example: Roku
      x-speakeasy-name-override: Platform
    X-Plex-Platform-Version:
      name: X-Plex-Platform-Version
      description: The version of the platform
      in: header
      schema:
        type: string
        example: 4.3 build 1057
      example: 4.3 build 1057
      x-speakeasy-name-override: Platform-Version
    X-Plex-Product:
      name: X-Plex-Product
      description: The name of the client product
      in: header
      schema:
        type: string
        example: Plex for Roku
      example: Plex for Roku
      x-speakeasy-name-override: Product
    X-Plex-Version:
      name: X-Plex-Version
      description: The version of the client application
      in: header
      schema:
        type: string
        example: 2.4.1
      example: 2.4.1
      x-speakeasy-name-override: Version
  headers:
    X-Plex-Container-Start:
