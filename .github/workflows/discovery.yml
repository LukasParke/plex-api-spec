name: Nightly Discovery Pipeline

# Captures synthetic traffic against a throwaway PMS via Arbiter and diffs
# it against plex-api-spec.yaml. Gaps (undocumented endpoints/params) fail
# the run and open-or-update a single `spec-drift` tracking issue; a clean
# run auto-closes it.

on:
  schedule:
    - cron: "0 6 * * *"
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "plex-api-spec.yaml"
      - "docker-compose.yml"
      - ".github/actions/plex-harness/**"
      - ".github/workflows/discovery.yml"

permissions:
  contents: read
  issues: write # open/update/close the spec-drift tracking issue

concurrency:
  group: nightly-discovery
  cancel-in-progress: true

jobs:
  preflight:
    name: Preflight (secret check)
    runs-on: ubuntu-latest
    outputs:
      has-token: ${{ steps.check.outputs.has-token }}
    steps:
      - id: check
        env:
          PLEX_ACCOUNT_TOKEN: ${{ secrets.PLEX_ACCOUNT_TOKEN }}
        run: |
          if [ -n "$PLEX_ACCOUNT_TOKEN" ]; then
            echo "has-token=true" >> "$GITHUB_OUTPUT"
          else
            echo "has-token=false" >> "$GITHUB_OUTPUT"
            echo "::warning::PLEX_ACCOUNT_TOKEN secret is not set — discovery run will be skipped (see CONTRIBUTING.md)."
          fi

  discover:
    needs: preflight
    if: needs.preflight.outputs.has-token == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Start Plex harness
        id: harness
        uses: ./.github/actions/plex-harness
        with:
          plex-account-token: ${{ secrets.PLEX_ACCOUNT_TOKEN }}

      - name: Start Arbiter proxy
        run: |
          cd "$GITHUB_WORKSPACE/../arbiter"
          node dist/src/cli.js start \
            --target http://localhost:32400 \
            --port 8080 \
            --docs-port 9000 \
            --db-path /tmp/arbiter.db \
            --verbose &
          echo "PROXY_PID=$!" >> "$GITHUB_ENV"
          for i in {1..30}; do
            if curl -sf http://localhost:8080/identity > /dev/null 2>&1; then
              echo "Proxy is ready"
              exit 0
            fi
            echo "Waiting for proxy... ($i/30)"
            sleep 1
          done
          echo "::error::Arbiter proxy did not become ready within 30s"
          exit 1

      - name: Generate traffic
        run: |
          cd "$GITHUB_WORKSPACE/../arbiter"
          node dist/src/cli.js generate-traffic \
            --target http://localhost:8080 \
            --output /tmp/traffic.jsonl

      - name: Stop Arbiter proxy
        if: always()
        run: kill "$PROXY_PID" 2>/dev/null || true

      - name: Diff traffic against spec
        id: diff
        env:
          # --exit-on-gap: non-zero exit when captured traffic hits
          # endpoints/params missing from the spec.
          DIFF_ARGS: --exit-on-gap
        run: |
          cd "$GITHUB_WORKSPACE/../arbiter"
          set +e
          node dist/src/cli.js diff \
            --spec "$GITHUB_WORKSPACE/plex-api-spec.yaml" \
            --traffic /tmp/traffic.jsonl \
            --output /tmp/diff_report.json \
            $DIFF_ARGS
          code=$?
          set -e
          echo "exit_code=$code" >> "$GITHUB_OUTPUT"
          echo "diff exited with $code"

      - name: Summarize diff report
        if: always()
        run: |
          {
            echo "### Discovery diff report"
            echo '```json'
            head -c 20000 /tmp/diff_report.json 2>/dev/null || echo "(no report produced)"
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Open or update spec-drift issue
        if: steps.diff.outputs.exit_code != '0'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
        run: |
          gh label create spec-drift --force \
            --description "Undocumented API surface detected by the nightly discovery pipeline" \
            --color D93F0B
          {
            echo "## Spec drift detected ($(date -u +%Y-%m-%d))"
            echo ""
            echo "Run: $GITHUB_SERVER_URL/$GITHUB_REPOSITORY/actions/runs/$GITHUB_RUN_ID"
            echo ""
            echo "<details><summary>Diff report</summary>"
            echo '```json'
            head -c 60000 /tmp/diff_report.json 2>/dev/null || echo "(no report produced)"
            echo '```'
            echo "</details>"
          } > /tmp/drift-issue.md
          existing=$(gh issue list --label spec-drift --state open --json number --jq '.[0].number' || true)
          if [ -n "$existing" ]; then
            gh issue comment "$existing" --body-file /tmp/drift-issue.md
            echo "Updated existing spec-drift issue #$existing"
          else
            gh issue create \
              --title "Spec drift: undocumented API surface discovered" \
              --label spec-drift \
              --body-file /tmp/drift-issue.md
            echo "Opened new spec-drift issue"
          fi

      - name: Close spec-drift issue when clean
        if: steps.diff.outputs.exit_code == '0'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
        run: |
          existing=$(gh issue list --label spec-drift --state open --json number --jq '.[0].number' || true)
          if [ -n "$existing" ]; then
            gh issue close "$existing" \
              --comment "Nightly discovery is clean as of $(date -u +%Y-%m-%d) (run $GITHUB_RUN_ID); closing."
            echo "Closed spec-drift issue #$existing"
          fi

      - name: Fail on spec gaps
        if: steps.diff.outputs.exit_code != '0'
        run: exit 1

      - name: Stop Plex Media Server
        if: always()
        run: docker compose down

      - name: Upload diff report
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: diff-report
          path: /tmp/diff_report.json
          retention-days: 30

      - name: Upload traffic capture
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: traffic-capture
          path: /tmp/traffic.jsonl
          retention-days: 30
